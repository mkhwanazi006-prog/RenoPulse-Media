<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RenoPulse Media | Information Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="info-page-body">

    <!-- Simple Navigation -->
    <nav class="nav-bar" style="padding: 20px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center;">
        <a href="index.html" class="logo" style="color: #ffffff; text-decoration: none; font-weight: bold; font-size: 1.2rem;">RenoPulse Media</a>
        <a href="index.html" class="back-home-btn" style="color: #8e8e93; text-decoration: none; font-size: 14px;">← Back to Home</a>
    </nav>

    <!-- Main Dynamic Content Wrapper -->
    <main class="info-single-container">
        <div class="info-card-panel" id="dynamicContentBlock">
            <!-- JavaScript will drop only the clicked section here -->
        </div>
    </main>

    <!-- Content Router Engine -->
    <script>
        const contentDatabase = {
            "privacy": {
                title: "Privacy Policy",
                html: `
                    <p class="policy-meta-date"><strong>Effective Date:</strong> 14 July 2026</p>
                    <p class="policy-intro-text">Welcome to RenoPulse Media ("RenoPulse Media", "we", "our", or "us"). Your privacy is important to us. This Privacy Policy explains how we collect, use, store, disclose, and protect your personal information when you use our website, services, and online marketplace. By accessing or using RenoPulse Media, you agree to the collection and use of your information in accordance with this Privacy Policy.</p>

                    <div class="policy-section">
                        <h4>1. Information We Collect</h4>
                        <p class="policy-text">We may collect the following information:</p>
                        <ul class="policy-list">
                            <li><strong>Personal Information:</strong> Full name, email address, phone number, physical address (where applicable), company name, business registration details (for contractors), and payment information (where applicable).</li>
                            <li><strong>Project Information:</strong> Property location, type of renovation or construction project, budget estimates, preferred project dates, and service requirements.</li>
                            <li><strong>Technical Information:</strong> IP address, browser type, device information, cookies, and website usage data.</li>
                        </ul>
                    </div>

                    <div class="policy-section">
                        <h4>2. How We Use Your Information</h4>
                        <p class="policy-text">We use your information to:</p>
                        <ul class="policy-list">
                            <li>Connect homeowners with suitable contractors and facilitate communication between them.</li>
                            <li>Improve our website, user experience, and overall services.</li>
                            <li>Respond to enquiries, process support requests, and send service updates or important notifications.</li>
                            <li>Verify contractor compliance information, prevent fraud, and improve platform security.</li>
                            <li>Comply with necessary legal obligations.</li>
                        </ul>
                    </div>

                    <div class="policy-section">
                        <h4>3. Sharing of Information</h4>
                        <p class="policy-text">We may share your information with verified contractors when you request quotations or services, service providers that help us operate our platform, payment processors (where applicable), and government authorities where required by law. <strong>We do not sell your personal information to third parties.</strong></p>
                    </div>

                    <div class="policy-section">
                        <h4>4. Data Security</h4>
                        <p class="policy-text">We take reasonable technical and organisational measures to protect your personal information against unauthorised access, loss, misuse, alteration, or disclosure. However, while we strive to protect your information, no online platform can guarantee complete security.</p>
                    </div>

                    <div class="policy-section">
                        <h4>5. Cookies</h4>
                        <p class="policy-text">Our website may use cookies to improve user experience, analyse website traffic, and remember your preferences. You may disable cookies through your browser settings; however, some features of the website may not function properly.</p>
                    </div>

                    <div class="policy-section">
                        <h4>6. Your Rights</h4>
                        <p class="policy-text">In accordance with the Protection of Personal Information Act (POPIA), you have the right to access your personal information, request correction of inaccurate information, request deletion of your data where legally permissible, or withdraw consent. You can also object to certain processing activities and lodge a complaint with the Information Regulator of South Africa.</p>
                    </div>

                    <div class="policy-section">
                        <h4>7. Contractor Responsibility</h4>
                        <p class="policy-text">RenoPulse Media acts as a platform connecting homeowners with independent contractors. Each contractor is responsible for the services they provide and for complying with all applicable laws and regulations. RenoPulse Media is not responsible for the quality, workmanship, pricing, warranties, or contractual obligations of independent contractors.</p>
                    </div>

                    <div class="policy-section">
                        <h4>8. Data Retention & 9. Third-Party Links</h4>
                        <p class="policy-text">We retain personal information only for as long as necessary to fulfil the purposes outlined in this Privacy Policy or as required by applicable law. Furthermore, our website may contain links to third-party websites. We are not responsible for the privacy practices or content of external websites.</p>
                    </div>

                    <div class="policy-section">
                        <h4>10. Changes & 11. Contact Us</h4>
                        <p class="policy-text">We may update this Privacy Policy from time to time. Any changes will be published on this page with an updated effective date. If you have any questions regarding this policy, please contact us at <strong>info@renopulsemedia.com</strong>.</p>
                    </div>
                `
            },
            "terms": {
                title: "Terms and Conditions",
                html: `
                    <p class="policy-meta-date"><strong>Effective Date:</strong> 14 July 2026</p>
                    <p class="policy-intro-text">Welcome to RenoPulse Media ("RenoPulse Media", "we", "our", or "us"). These Terms and Conditions govern your access to and use of our website, services, and online marketplace. By accessing or using RenoPulse Media, you acknowledge that you have read, understood, and agree to be bound by these Terms and Conditions. If you do not agree, you must not use our platform.</p>

                    <div class="policy-section">
                        <h4>1. About RenoPulse Media & 2. Eligibility</h4>
                        <p class="policy-text">RenoPulse Media is an online marketplace that connects homeowners with independent contractors operating within the home improvement industry. Our platform also provides digital marketing, lead generation, and business growth services to contractors. RenoPulse Media does not perform construction, renovation, repair, or maintenance services. By using our platform, you confirm that you are at least 18 years of age, have full legal capacity, and provide accurate information.</p>
                    </div>

                    <div class="policy-section">
                        <h4>3. Homeowner Responsibilities</h4>
                        <p class="policy-text">Homeowners agree to provide accurate project details, communicate honestly with contractors, conduct their own due diligence before hiring, and obtain quotations and enter into agreements directly with the chosen contractor.</p>
                    </div>

                    <div class="policy-section">
                        <h4>4. Contractor Responsibilities</h4>
                        <p class="policy-text">Contractors using RenoPulse Media agree to provide accurate business information, hold all licences, registrations, and insurance required by law, deliver services professionally, and honour quotations, contracts, and warranties provided to customers. Contractors are solely responsible for the services they provide.</p>
                    </div>

                    <div class="policy-section">
                        <h4>5. Marketplace Role & 6. Quotes</h4>
                        <p class="policy-text">RenoPulse Media acts solely as an intermediary connecting homeowners and contractors. We are not a contractor, we do not supervise construction work, and we do not guarantee the quality of work or act as a party to construction contracts. Any quotation provided through the platform is supplied entirely by the contractor. RenoPulse Media does not determine, negotiate, approve, or guarantee pricing.</p>
                    </div>

                    <div class="policy-section">
                        <h4>7. Payments, 8. Reviews & 9. Intellectual Property</h4>
                        <p class="policy-text">Payments for renovation or construction work are made directly between the homeowner and the contractor. Users may submit reviews based on genuine experiences, and RenoPulse reserves the right to remove false, fraudulent, or defamatory content. All content on RenoPulse Media, including logos, branding, graphics, and text, is our property and cannot be copied without prior written permission.</p>
                    </div>

                    <div class="policy-section">
                        <h4>10. Limitation of Liability</h4>
                        <p class="policy-text">To the maximum extent permitted by South African law, RenoPulse Media shall not be liable for poor workmanship, construction defects, delays, cost overruns, property damage, personal injury, contractor misconduct, financial losses, or contract disputes. Users acknowledge that hiring decisions are made at their own discretion and risk.</p>
                    </div>

                    <div class="policy-section">
                        <h4>11. Indemnity & 12. Suspension or Termination</h4>
                        <p class="policy-text">Users agree to indemnify and hold RenoPulse Media harmless from any claims, damages, liabilities, or legal costs arising from misuse of the platform, breach of these Terms, or disputes with contractors. We reserve the right to suspend or terminate any account that breaches these Terms or engages in fraudulent or illegal activity.</p>
                    </div>

                    <div class="policy-section">
                        <h4>13. Privacy, 14. Changes & 15. Governing Law</h4>
                        <p class="policy-text">Personal information is processed in accordance with our Privacy Policy and POPIA. Continued use of the platform after changes are published constitutes acceptance of the revised Terms. These Terms shall be governed by and interpreted in accordance with the laws of the Republic of South Africa, subject to the jurisdiction of the South African courts.</p>
                    </div>
                `
            },
            "faqs": {
                title: "Frequently Asked Questions",
                html: `
                    <div class="faq-section-wrapper">
                        
                        <div class="faq-group-block">
                            <h3 class="faq-group-title">FOR CUSTOMERS</h3>
                            
                            <div class="faq-card">
                                <h5 class="faq-question">How do I request a quote?</h5>
                                <p class="faq-answer">Requesting a quote is simple. Browse our contractor categories or use the search feature to find professionals that match your project. Select a contractor, click "Request a Quote," and complete the project enquiry form with details such as the type of work, your location, budget (optional), and any photos of the project. Your request will then be sent directly to the contractor, who will contact you with a quotation.</p>
                            </div>

                            <div class="faq-card">
                                <h5 class="faq-question">Is RenoPulse free?</h5>
                                <p class="faq-answer">Yes. RenoPulse is completely free for homeowners looking to find contractors and request quotations. You can browse contractor profiles, compare services, and request multiple quotes at no cost.</p>
                            </div>

                            <div class="faq-card">
                                <h5 class="faq-question">How are contractors verified?</h5>
                                <p class="faq-answer">Every contractor who joins RenoPulse goes through a verification process before being listed on our platform. We review business information, contact details, relevant documentation, and previous work where applicable. We also monitor customer feedback and reviews to help maintain a trusted network of professionals.</p>
                            </div>

                            <div class="faq-card">
                                <h5 class="faq-question">Can I compare multiple quotations?</h5>
                                <p class="faq-answer">Absolutely. We encourage homeowners to request and compare quotations from different contractors. Comparing prices, experience, customer reviews, and project portfolios helps you make an informed decision and choose the contractor that best fits your needs and budget.</p>
                            </div>

                            <div class="faq-card">
                                <h5 class="faq-question">How do reviews work?</h5>
                                <p class="faq-answer">After your project has been completed, you'll have the opportunity to leave an honest review based on your experience. Reviews cover areas such as workmanship, professionalism, communication, reliability, and overall satisfaction. These reviews help future customers make informed decisions while rewarding contractors who consistently deliver quality work.</p>
                            </div>
                        </div>

                        <div class="faq-group-block" style="margin-top: 45px;">
                            <h3 class="faq-group-title">FOR CONTRACTORS</h3>
                            
                            <div class="faq-card">
                                <h5 class="faq-question">How do I join RenoPulse?</h5>
                                <p class="faq-answer">Joining RenoPulse is easy. Click on "Join RenoPulse" and complete the contractor registration form with your business details, contact information, services offered, and portfolio. Once submitted, our team will review your application before publishing your profile on the platform.</p>
                            </div>

                            <div class="faq-card">
                                <h5 class="faq-question">How much does it cost?</h5>
                                <p class="faq-answer">During our launch phase, contractor listings may be offered free of charge or through promotional plans. As RenoPulse grows, we plan to introduce affordable subscription packages that provide additional features such as premium listings, increased visibility, and enhanced lead generation. Pricing will always be communicated clearly before any charges apply.</p>
                            </div>

                            <div class="faq-card">
                                <h5 class="faq-question">How do I receive leads?</h5>
                                <p class="faq-answer">When homeowners submit quote requests for services you provide within your service area, you'll receive the enquiry directly through your RenoPulse contractor account and/or your registered email. You can then contact the customer, discuss their project, and provide a quotation.</p>
                            </div>

                            <div class="faq-card">
                                <h5 class="faq-question">How do I become verified?</h5>
                                <p class="faq-answer">Verification requires completing your business profile and submitting the requested information, which may include your business registration details, contact information, previous project portfolio, and any relevant certifications. Once our team has reviewed and approved your application, your profile will display a Verified badge to build customer confidence.</p>
                            </div>

                            <div class="faq-card">
                                <h5 class="faq-question">Can I edit my profile?</h5>
                                <p class="faq-answer">Yes. Contractors can update their profile at any time. You can add new services, upload recent project photos, update your contact information, expand your service areas, modify your business description, and keep your portfolio current to attract more customers.</p>
                            </div>
                        </div>

                    </div>
                `
            }
        };

        // Router injection logic
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const pageKey = urlParams.get('page');
            const targetBlock = document.getElementById('dynamicContentBlock');

            const activeData = contentDatabase[pageKey] || contentDatabase['faqs'];

            targetBlock.innerHTML = `
                <h1 class="info-main-title">${activeData.title}</h1>
                <div class="info-body-content">${activeData.html}</div>
            `;
        });
    </script>
</body>
</html>
