<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RenoPulse Media | Information Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="info-page-body">

    <!-- Simple Navigation matching your theme -->
    <nav class="nav-bar" style="padding: 20px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center;">
        <a href="index.html" class="logo" style="color: #ffffff; text-decoration: none; font-weight: bold; font-size: 1.2rem;">RenoPulse Media</a>
        <a href="index.html" class="back-home-btn" style="color: #8e8e93; text-decoration: none; font-size: 14px;">← Back to Home</a>
    </nav>

    <!-- Main Dynamic Content Wrapper -->
    <main class="info-single-container">
        <div class="info-card-panel" id="dynamicContentBlock">
            <!-- JavaScript will drop only the clicked section here -->
        </div>
    </main>

    <!-- Content Router Engine -->
    <script>
        const contentDatabase = {
            "privacy": {
                title: "Privacy Policy",
                html: `
                    <div class="policy-section">
                        <h4>1. Data Protection & Compliance</h4>
                        <p class="policy-text">Your data privacy matters heavily to us. RenoPulse Media securely protects all system credentials, messaging channels, and account details in strict alignment with POPIA (Protection of Personal Information Act) compliance frameworks.</p>
                    </div>

                    <div class="policy-section">
                        <h4>2. Information Collection</h4>
                        <p class="policy-text">We collect profile metadata explicitly to improve target accuracy between users and field technicians across our regional optimization layers. We do not distribute lead profiling documents to external third parties without explicit authorization blocks.</p>
                    </div>

                    <div class="policy-section">
                        <h4>3. Secure Communication</h4>
                        <p class="policy-text">All interactions, quotes, and files shared within the network are protected against unauthorized access using modern server-side encryption measures.</p>
                    </div>
                `
            },
            "terms": {
                title: "Terms & Conditions",
                html: `
                    <div class="policy-section">
                        <h4>1. Marketplace Role</h4>
                        <p class="policy-text">By utilizing this discovery channel, users confirm complete alignment with professional execution frameworks. All transactional agreements are established directly between clients and independent contractor groups; RenoPulse Media serves purely as a discovery facilitator tool.</p>
                    </div>

                    <div class="policy-section">
                        <h4>2. Contractor Responsibilities</h4>
                        <p class="policy-text">Contractors are fully responsible for ensuring their industry validation metrics, insurance registrations, and certifications remain completely up to date while listed publicly on our ecosystem panels.</p>
                    </div>

                    <div class="policy-section">
                        <h4>3. Service Use Rules</h4>
                        <p class="policy-text">RenoPulse reserves the right to unpublish profiles that drop below standard community ratings or violate structural compliance agreements during client interactions.</p>
                    </div>
                `
            },
            "faqs": {
                title: "Frequently Asked Questions",
                html: `
                    <div class="faq-section-wrapper">
                        
                        <!-- CUSTOMER SEGMENT -->
                        <div class="faq-group-block">
                            <h3 class="faq-group-title">FOR CUSTOMERS</h3>
                            
                            <div class="faq-card">
                                <h5 class="faq-question">How do I request a quote?</h5>
                                <p class="faq-answer">Browse our contractor categories or use the search feature to find professionals that match your project. Select a contractor, click "Request a Quote," and complete the project enquiry form with details such as the type of work, location, and budget. Your request will then be sent directly to the contractor, who will reach out with a quotation.</p>
                            </div>

                            <div class="faq-card">
                                <h5 class="faq-question">Is RenoPulse free?</h5>
                                <p class="faq-answer">Yes. RenoPulse is completely free for homeowners looking to find contractors and request quotations. You can browse profiles, compare services, and ask for multiple quotes at no cost.</p>
                            </div>

                            <div class="faq-card">
                                <h5 class="faq-question">How are contractors verified?</h5>
                                <p class="faq-answer">Every contractor goes through a verification process before being listed. We review business information, contact details, relevant documentation, and previous work. We also monitor customer feedback to maintain a trusted network.</p>
                            </div>

                            <div class="faq-card">
                                <h5 class="faq-question">Can I compare multiple quotations?</h5>
                                <p class="faq-answer">Absolutely. We encourage homeowners to request and compare quotations from different contractors. Comparing prices, experience, and portfolios helps you make the best choice for your budget.</p>
                            </div>

                            <div class="faq-card">
                                <h5 class="faq-question">How do reviews work?</h5>
                                <p class="faq-answer">After your project is finished, you can leave an honest review. Reviews cover workmanship, professionalism, communication, and reliability to help future customers make informed decisions.</p>
                            </div>
                        </div>

                        <!-- CONTRACTOR SEGMENT -->
                        <div class="faq-group-block" style="margin-top: 45px;">
                            <h3 class="faq-group-title">FOR CONTRACTORS</h3>
                            
                            <div class="faq-card">
                                <h5 class="faq-question">How do I join RenoPulse?</h5>
                                <p class="faq-answer">Click on "Join RenoPulse" and complete the contractor registration form with your business details, contact information, services offered, and portfolio. Once submitted, our team will review your application before publishing your profile.</p>
                            </div>

                            <div class="faq-card">
                                <h5 class="faq-question">How much does it cost?</h5>
                                <p class="faq-answer">During our launch phase, contractor listings are free or offered through promotional plans. As RenoPulse grows, we plan to introduce affordable subscription packages for enhanced features. Pricing will always be communicated clearly in advance.</p>
                            </div>

                            <div class="faq-card">
                                <h5 class="faq-question">How do I receive leads?</h5>
                                <p class="faq-answer">When homeowners submit quote requests for services in your area, you'll receive the enquiry directly through your contractor account and/or your registered email to follow up.</p>
                            </div>

                            <div class="faq-card">
                                <h5 class="faq-question">How do I become verified?</h5>
                                <p class="faq-answer">Verification requires completing your business profile and submitting requested details (business registration, certifications, portfolios). Approved profiles display a Verified badge to build client confidence.</p>
                            </div>

                            <div class="faq-card">
                                <h5 class="faq-question">Can I edit my profile?</h5>
                                <p class="faq-answer">Yes. Contractors can update services, upload recent project photos, expand service areas, and keep their portfolio current at any time through their dashboard.</p>
                            </div>
                        </div>

                    </div>
                `
            }
        };

        // Read URL parameter and injection logic
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const pageKey = urlParams.get('page');
            const targetBlock = document.getElementById('dynamicContentBlock');

            const activeData = contentDatabase[pageKey] || contentDatabase['faqs'];

            targetBlock.innerHTML = `
                <h1 class="info-main-title">${activeData.title}</h1>
                <div class="info-body-content">${activeData.html}</div>
            `;
        });
    </script>
</body>
</html>
