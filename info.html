<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RenoPulse Media | Information Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="info-page-body">

    <!-- Navigation -->
    <nav class="nav-bar" style="padding: 20px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center;">
        <a href="index.html" class="logo" style="color: #ffffff; text-decoration: none; font-weight: bold; font-size: 1.2rem;">RenoPulse Media</a>
        <a href="index.html" class="back-home-btn" style="color: #8e8e93; text-decoration: none; font-size: 14px;">← Back to Home</a>

    <!-- Main Dynamic Content Wrapper -->
    <main class="info-single-container">
        <div class="info-card-panel" id="dynamicContentBlock">
            <!-- JavaScript drops the targeted panel here -->
        </div>
    </main>

    <!-- Content Router Engine -->
    <script>
        const contentDatabase = {
            "privacy": {
                title: "Privacy Policy",
                html: `

                            <li><strong>Personal Information:</strong> Full name, email address, phone number, physical address (where applicable), company name, business registration details (for contractors), and payment information (where applicable)[cite: 1].</li>
                            <li><strong>Project Information:</strong> Property location, type of renovation or construction project, budget estimates, preferred project dates, and service requirements[cite: 1].</li>
                            <li><strong>Technical Information:</strong> IP address, browser type, device information, cookies, and website usage data[cite: 1].</li>
                        </ul>
                    </div>
                    <!-- Remaining Privacy Sections Stay Intact -->
                `
            },
            "terms": {
                title: "Terms and Conditions",
                html: `
                    <p class="policy-meta-date"><strong>Effective Date:</strong> 14 July 2026</p>
                    <p class="policy-intro-text">Welcome to RenoPulse Media ("RenoPulse Media", "we", "our", or "us"). These Terms and Conditions govern your access to and use of our website, services, and online marketplace[cite: 2]. By accessing or using RenoPulse Media, you acknowledge that you have read, understood, and agree to be bound by these Terms and Conditions[cite: 2].</p>

                    <div class="policy-section">
                        <h4>1. About RenoPulse Media</h4>
                        <p class="policy-text">RenoPulse Media is an online marketplace that connects homeowners with independent contractors operating within the home improvement industry[cite: 2]. Our platform also provides digital marketing, lead generation, and business growth services to contractors[cite: 2]. RenoPulse Media does not perform construction, renovation, repair, or maintenance services[cite: 2].</p>
                    </div>
                    <!-- Remaining Terms Sections Stay Intact -->
                `
            },
            "faqs": {
                title: "Frequently Asked Questions",
                html: `
                    <div class="faq-section-wrapper">
                        <div class="faq-group-block">
                            <h3 class="faq-group-title">FOR CUSTOMERS</h3>
                            <div class="faq-card">
                                <h5 class="faq-question">How do I request a quote?</h5>
                                <p class="faq-answer">Browse our contractor categories or use the search feature to find professionals that match your project. Select a contractor, click "Request a Quote," and complete the project enquiry form with details such as the type of work, your location, budget (optional), and any photos of the project. Your request will then be sent directly to the contractor, who will contact you with a quotation[cite: 2].</p>
                            </div>
                            <!-- Customer Questions Stay Intact -->
                        </div>
                    </div>
                `
            },
            "reviews": {
                title: "Customer Reviews",
                html: `
                    <div class="story-section-wrapper">
                        <p class="policy-intro-text">See how RenoPulse Media helps homeowners effortlessly source trusted professionals for their construction and renovation projects.</p>
                        
                        <div class="faq-card">
                            <h5 class="faq-question">"Eliminated all the guesswork completely"</h5>
                            <p class="faq-answer" style="font-style: italic; margin-bottom: 10px;">"Finding a reliable team for our home renovation used to be stressful. Through RenoPulse, we requested quotes easily, reviewed portfolios, and found a verified bathroom remodeling team that delivered pristine work right within our budget timeline."</p>
                            <span style="color: #8e8e93; font-size: 12px; font-weight: bold;">— Thabo M., Sandton</span>
                        </div>

                        <div class="faq-card">
                            <h5 class="faq-question">"Transparent and highly professional"</h5>
                            <p class="faq-answer" style="font-style: italic; margin-bottom: 10px;">"I loved being able to compare multiple quotes without paying a single cent. The contractor verification process gave me real confidence, and the standard of workmanship was outstanding."</p>
                            <span style="color: #8e8e93; font-size: 12px; font-weight: bold;">— Elena S., Cape Town</span>
                        </div>
                    </div>
                `
            },
            "stories": {
                title: "Success Stories",
                html: `
                    <div class="story-section-wrapper">
                        <p class="policy-intro-text">Discover how trade contractors and home improvement specialists are scaling their client acquisitions through our digital pipeline frameworks.</p>
                        
                        <div class="faq-card">
                            <h5 class="faq-question">Apex Remodeling: 80% Growth Spike</h5>
                            <p class="faq-answer" style="margin-bottom: 10px;">After restructuring their business placement listing and joining RenoPulse Media, Apex Remodeling saw an immediate 80% surge in consistent commercial interior volumes over a single 4-month operational run. The direct lead distribution pipeline completely streamlined their client onboarding process.</p>
                            <span style="color: #8e8e93; font-size: 12px; font-weight: bold;">📍 Location: Gauteng Regional Hub</span>
                        </div>

                        <div class="faq-card">
                            <h5 class="faq-question">KZN Structural Partners: From Launch Phase to Fully Booked</h5>
                            <p class="faq-answer" style="margin-bottom: 10px;">"As a growing engineering company, finding steady project leads was hard. Joining the platform paired us directly with high-intent homeowners in our service sectors, keeping our service pipelines active month after month."</p>
                            <span style="color: #8e8e93; font-size: 12px; font-weight: bold;">📍 Location: Durban & Surrounding Areas</span>
                        </div>
                    </div>
                `
            }
        };

        // Router injection logic
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const pageKey = urlParams.get('page');
            const targetBlock = document.getElementById('dynamicContentBlock');

            const activeData = contentDatabase[pageKey] || contentDatabase['faqs'];

            targetBlock.innerHTML = `
                <h1 class="info-main-title">${activeData.title}</h1>
                <div class="info-body-content">${activeData.html}</div>
            `;
        });
    </script>
</body>
</html>
